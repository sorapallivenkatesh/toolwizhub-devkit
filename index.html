<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevKit — Developer Utilities · ToolWizHub</title>
  <meta name="description" content="Free, private developer toolbox: JWT inspector, regex tester, cron explainer, base64/URL/hex/SHA hashing, UUID/ULID/token & password generators, epoch↔date, color/case/base converters and text diff — 100% in your browser." />

  <meta property="og:title" content="DevKit — ToolWizHub" />
  <meta property="og:description" content="JWT, regex, cron, hashing, UUID, epoch, password & more — all in your browser, nothing uploaded." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://devkit.toolwizhub.com" />
  <meta property="og:image" content="https://devkit.toolwizhub.com/assets/logo-full.webp" />
  <meta property="og:site_name" content="ToolWizHub" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="DevKit — ToolWizHub" />
  <meta name="twitter:description" content="A developer's utility belt that runs entirely in your browser." />
  <meta name="twitter:image" content="https://devkit.toolwizhub.com/assets/logo-full.webp" />

  <meta name="theme-color" content="#07070d" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://devkit.toolwizhub.com/" />

  <script type="application/ld+json">
    {
      "@context": "https://schema.org", "@type": "WebApplication",
      "name": "DevKit", "url": "https://devkit.toolwizhub.com/",
      "description": "In-browser developer utilities: JWT, regex, cron, hashing, UUID, epoch, password and converters.",
      "applicationCategory": "DeveloperApplication", "operatingSystem": "Web browser",
      "browserRequirements": "Requires JavaScript",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "publisher": { "@type": "Organization", "name": "ToolWizHub", "url": "https://toolwizhub.com" }
    }
  </script>

  <link rel="icon" type="image/webp" href="assets/favicon.webp" />
  <link rel="apple-touch-icon" href="assets/logo-icon.webp" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <script>
    try { if (sessionStorage.getItem("devkit:splashed")) document.documentElement.classList.add("no-splash"); } catch (e) {}
  </script>
</head>
<body>
  <div class="splash" id="splash" aria-hidden="true">
    <div class="splash__stage">
      <div class="splash__glow"></div>
      <div class="splash__sparkles"><span></span><span></span><span></span><span></span><span></span><span></span></div>
      <img class="splash__logo" src="assets/logo-full.webp" alt="ToolWizHub" width="200" height="200" />
      <div class="splash__tagline">DevKit</div>
      <div class="splash__bar"><span></span></div>
    </div>
  </div>

  <div class="app">
    <header class="appbar">
      <a class="brand" href="https://toolwizhub.com" aria-label="ToolWizHub DevKit">
        <img class="brand__mark" src="assets/logo-icon.webp" alt="ToolWizHub" width="42" height="42" />
        <span class="brand__text"><strong>ToolWizHub</strong><span>DEVKIT</span></span>
      </a>
      <span class="local-badge" title="Everything runs in your browser">🔒 100% local · no uploads</span>
    </header>

    <nav class="toolbar">
      <div class="tool-pills" id="tool-pills"></div>
    </nav>

    <main class="work">
      <div class="work__head">
        <span class="work__cat" id="tool-cat"></span>
        <h1 class="work__title" id="tool-title"></h1>
        <p class="work__desc" id="tool-desc"></p>
      </div>
      <div class="tool" id="tool-mount"></div>
    </main>

    <footer class="app-footer">
      <a class="app-footer__brand" href="https://toolwizhub.com" target="_blank" rel="noopener" title="More free tools at ToolWizHub">
        <span class="app-footer__label">More free tools at</span>
        <img src="assets/logo-horizontal.webp" alt="ToolWizHub" />
      </a>
      <p class="app-footer__credit">100% client-side · nothing uploaded · <a href="privacy.html">Privacy</a></p>
    </footer>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
